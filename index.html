
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle of Balls</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:15px;
    font-size:36px;
}

#controls{
    margin:15px;
}

input{
    width:80px;
    padding:5px;
    font-size:16px;
}

button{
    padding:8px 20px;
    font-size:16px;
    cursor:pointer;
    background:#222;
    color:white;
    border:1px solid #555;
}

#arena{
    position:relative;
    width:100%;
    height:70vh;
    overflow:hidden;
    border-top:2px solid #333;
}

/* ЗОНЫ */
#blueZone{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    background:#0066ff;
    width:50%;
    transition:width 0.5s;
}

#greenZone{
    position:absolute;
    right:0;
    top:0;
    height:100%;
    background:#00cc44;
    width:50%;
    transition:width 0.5s;
}

/* ШАР */
#ball{
    position:absolute;
    width:30px;
    height:30px;
    border-radius:50%;
    background:white;
}
</style>
</head>
<body>

<h1>⚔️ Battle of Balls</h1>

<div id="controls">
    Blue TON: <input type="number" id="blueInput" value="1" step="0.1">
    Green TON: <input type="number" id="greenInput" value="1" step="0.1">
    <button onclick="startGame()">START</button>
</div>

<div id="arena">
    <div id="blueZone"></div>
    <div id="greenZone"></div>
    <div id="ball"></div>
</div>

<script>
let ball = document.getElementById("ball");
let blueZone = document.getElementById("blueZone");
let greenZone = document.getElementById("greenZone");
let arena = document.getElementById("arena");

let x, y, dx, dy;
let animation;
let speed = 20;
let duration = 7000;
let startTime;

function updateZones(){
    let blue = parseFloat(document.getElementById("blueInput").value) || 0;
    let green = parseFloat(document.getElementById("greenInput").value) || 0;

    let total = blue + green;

    if(total === 0){
        blueZone.style.width = "50%";
        greenZone.style.width = "50%";
        return;
    }

    let bluePercent = (blue / total) * 100;
    let greenPercent = 100 - bluePercent;

    blueZone.style.width = bluePercent + "%";
    greenZone.style.width = greenPercent + "%";
}

function startGame(){

    updateZones();

    let blue = parseFloat(document.getElementById("blueInput").value) || 0;
    let green = parseFloat(document.getElementById("greenInput").value) || 0;

    let total = blue + green;
    if(total === 0){
        alert("No TON placed");
        return;
    }

    x = arena.clientWidth / 2;
    y = arena.clientHeight / 2;

    dx = (Math.random() - 0.5) * speed;
    dy = (Math.random() - 0.5) * speed;

    startTime = Date.now();

    cancelAnimationFrame(animation);
    animate();
}

function animate(){

    let now = Date.now();
    let elapsed = now - startTime;

    let progress = elapsed / duration;

    if(progress > 1){
        progress = 1;
    }

    let currentSpeed = speed * (1 - progress);

    x += dx * (currentSpeed / speed);
    y += dy * (currentSpeed / speed);

    if(x <= 0 || x >= arena.clientWidth - 30) dx *= -1;
    if(y <= 0 || y >= arena.clientHeight - 30) dy *= -1;

    ball.style.left = x + "px";
    ball.style.top = y + "px";

    if(progress < 1){
        animation = requestAnimationFrame(animate);
    }else{
        finishGame();
    }
}

function finishGame(){
    let blueWidth = blueZone.clientWidth;

    if(x < blueWidth){
        alert("🔵 BLUE WINS");
    }else{
        alert("🟢 GREEN WINS");
    }
}
</script>

</body>
</html>
