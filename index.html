<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle of Balls</title>

<style>
:root{
  --bg:#0b0f1a;
  --card:#121829;
  --blue:#1e66ff;
  --green:#00c853;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter, Arial, sans-serif;
  background:linear-gradient(180deg,#0b0f1a,#05070d);
  color:#fff;
  text-align:center;
}

h1{
  margin:20px 0 10px;
  font-size:34px;
  font-weight:700;
  letter-spacing:1px;
}

.panel{
  background:var(--card);
  display:inline-block;
  padding:15px 25px;
  border-radius:14px;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

input{
  width:90px;
  padding:6px;
  margin:5px;
  border-radius:8px;
  border:none;
  text-align:center;
  font-size:15px;
}

button{
  padding:8px 22px;
  border:none;
  border-radius:10px;
  background:#1e66ff;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}
button:hover{opacity:0.85}

#arena{
  position:relative;
  margin-top:20px;
  width:100%;
  height:65vh;
  overflow:hidden;
  border-top:2px solid #1b2238;
}

/* Зоны */
#blueZone{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  background:linear-gradient(90deg,#0d2b6b,#1e66ff);
  width:50%;
  transition:width .4s;
}

#greenZone{
  position:absolute;
  right:0;
  top:0;
  height:100%;
  background:linear-gradient(90deg,#00c853,#006b2e);
  width:50%;
  transition:width .4s;
}

/* Шар */
#ball{
  position:absolute;
  width:55px;
  height:55px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#ffffff,#cfcfcf);
  box-shadow:0 0 20px rgba(255,255,255,0.6);
}
</style>
</head>
<body>

<h1>⚔ Battle of Balls</h1>

<div class="panel">
  🔵 <input type="number" id="blueInput" value="1" step="0.1">
  🟢 <input type="number" id="greenInput" value="1" step="0.1">
  <button onclick="startGame()">START</button>
</div>

<div id="arena">
  <div id="blueZone"></div>
  <div id="greenZone"></div>
  <div id="ball"></div>
</div>

<script>
const ball = document.getElementById("ball");
const arena = document.getElementById("arena");
const blueZone = document.getElementById("blueZone");

let x,y,dx,dy;
let startTime;
let animation;
let duration = 7000;        // 7 секунд
let startSpeed = 45;        // ОЧЕНЬ быстрый старт

function updateZones(){
  let blue = parseFloat(blueInput.value)||0;
  let green = parseFloat(greenInput.value)||0;
  let total = blue+green;

  if(total===0){
    blueZone.style.width="50%";
    greenZone.style.width="50%";
    return;
  }

  let bluePercent=(blue/total)*100;
  blueZone.style.width=bluePercent+"%";
  greenZone.style.width=(100-bluePercent)+"%";
}

function startGame(){
  updateZones();

  x = arena.clientWidth/2;
  y = arena.clientHeight/2;

  dx = (Math.random()-0.5);
  dy = (Math.random()-0.5);

  let length = Math.sqrt(dx*dx+dy*dy);
  dx/=length;
  dy/=length;

  startTime = performance.now();

  cancelAnimationFrame(animation);
  animate();
}

function animate(time){
  let elapsed = time - startTime;
  let progress = elapsed / duration;
  if(progress>1) progress=1;

  // Плавное замедление (ease-out cubic)
  let speed = startSpeed * (1 - Math.pow(progress,3));

  x += dx * speed;
  y += dy * speed;

  if(x<=0 || x>=arena.clientWidth-55) dx*=-1;
  if(y<=0 || y>=arena.clientHeight-55) dy*=-1;

  ball.style.left=x+"px";
  ball.style.top=y+"px";

  if(progress<1){
    animation=requestAnimationFrame(animate);
  }else{
    finishGame();
  }
}

function finishGame(){
  let blueWidth=blueZone.clientWidth;
  if(x<blueWidth){
    alert("🔵 BLUE WINS");
  }else{
    alert("🟢 GREEN WINS");
  }
}
</script>

</body>
</html>
