<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Game</title>
<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

#ball {
  width:40px;
  height:40px;
  background:red;
  border-radius:50%;
  position:absolute;
  left:100px;
  top:100px;
}
</style>
</head>
<body>

<h1>Моя первая игра</h1>
<div id="ball"></div>

<script>
let ball = document.getElementById("ball");
let x = 100;
let y = 100;
let dx = 3;
let dy = 3;

setInterval(() => {
  x += dx;
  y += dy;

  if (x <= 0 || x >= window.innerWidth - 40) dx *= -1;
  if (y <= 0 || y >= window.innerHeight - 40) dy *= -1;

  ball.style.left = x + "px";
  ball.style.top = y + "px";
}, 16);
</script>

</body>
</html>
